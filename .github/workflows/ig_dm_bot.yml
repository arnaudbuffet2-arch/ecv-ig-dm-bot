name: Instagram DM Bot

on:
  schedule:
    - cron: "*/5 * * * *"   # toutes les 5 minutes
  workflow_dispatch:          # déclenchement manuel possible

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        id: run_bot
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: python instagram_dm_bot.py

      - name: Update token secret if refreshed
        if: steps.run_bot.outputs.new_token != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: echo "${{ steps.run_bot.outputs.new_token }}" | gh secret set IG_ACCESS_TOKEN --repo ${{ github.repository }}

      - name: Save state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add instagram_dm_bot_state.json
          git diff --cached --quiet || git commit -m "chore: update bot state"
          git pull --rebase origin main
          git push
